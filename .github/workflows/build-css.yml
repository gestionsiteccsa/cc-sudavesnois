name: Build CSS Tailwind

description: Régénère static/css/output.min.css et commit le résultat à chaque push sur main

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'home/templates/**'
      - 'accounts/templates/**'
      - 'backup/templates/**'
      - 'bureau_communautaire/templates/**'
      - 'commissions/templates/**'
      - 'communes_membres/templates/**'
      - 'competences/templates/**'
      - 'comptes_rendus/templates/**'
      - 'conseil_communautaire/templates/**'
      - 'contact/templates/**'
      - 'journal/templates/**'
      - 'linktree/templates/**'
      - 'partenaires/templates/**'
      - 'rapports_activite/templates/**'
      - 'semestriels/templates/**'
      - 'services/templates/**'
      - 'staticfiles/**'
      - 'tailwind.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-css.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-css
  cancel-in-progress: false

jobs:
  build-css:
    name: Build & commit output.min.css
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Installer les dépendances npm
        run: npm ci

      - name: Régénérer le CSS Tailwind
        run: |
          npm run build:css
          npm run build:css:prod

      - name: Committer le CSS régénéré
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build(css): regen output.min.css (auto)"
          file_pattern: static/css/output.min.css static/css/output.css
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          skip_dirty_check: false
          push_options: '--force-with-lease'
